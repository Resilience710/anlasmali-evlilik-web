# OpenLiteSpeed reverse proxy — CyberPanel vHost Conf'a eklenecek bloklar.
# CyberPanel → Websites → List Websites → anlasmalievlilik.com → Manage →
#   "vHost Conf" sekmesi → aşağıdakileri ekle/var olan `context /` ile değiştir.
# Kaydet → "Restart OpenLiteSpeed".
#
# Uygulama 127.0.0.1:3000'de (PM2) çalışıyor olmalı.

extprocessor nodeapp {
  type                    proxy
  address                 127.0.0.1:3000
  maxConns                100
  initTimeout             60
  retryTimeout            0
  respBuffer              0
  pcKeepAliveTimeout      60
}

context / {
  type                    proxy
  handler                 nodeapp
  addDefaultCharset       off
}
