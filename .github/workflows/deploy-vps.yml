name: Deploy to VPS

# VPS'e SSH ile dağıtım. ŞİMDİLİK manuel tetiklenir (workflow_dispatch) —
# VPS hazır + secret'lar girilince Actions sekmesinden "Run workflow" ile çalıştır.
# VPS tamamen yayına geçtiğinde aşağıdaki "push" tetikleyicisini açabilirsin.
#
# Gerekli GitHub Secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST      -> 104.247.164.217
#   VPS_USER      -> root (ya da deploy kullanıcısı)
#   VPS_SSH_KEY   -> sunucuya yetkili özel SSH anahtarı (PEM içeriği)
#   VPS_APP_PATH  -> /home/anlasmalievlilik.com/app

on:
  workflow_dispatch:
  # push:
  #   branches: [main]

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_PATH }}
            git pull --ff-only
            npm ci
            npm run build
            pm2 restart anlasmali-evlilik --update-env
            pm2 save
